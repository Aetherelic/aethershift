font_family JetBrainsMono Nerd Font
font_size 13

background #05090b
foreground #dce0da
background_opacity 0.92
dynamic_background_opacity yes

# Re-map ANSI green/cyan to rice colours so cmatrix matches the setup
color2  #9db6ad
color10 #c3ccb8
color6  #7fa6a2
color14 #9db6ad

cursor #9db6ad
cursor_shape block
cursor_blink_interval 0

window_padding_width 0
hide_window_decorations yes
confirm_os_window_close 0
enable_audio_bell no
scrollback_lines 1
