# ============================================================
#  hyprland.conf 
# ============================================================

# ── Sources ────────────────────────────────────────────────
source = ~/.config/hypr/colors.conf


# ── Monitors ────────────────────────────────────────────────

monitor = eDP-1, 1920x1080@144, 0x0, 1    # internal display @ 144hz
monitor = ,      preferred,     auto,  auto # external — plug & play


# ── Variables ───────────────────────────────────────────────

$terminal    = kitty
$fileManager = thunar
$browser     = firefox
$scripts     = ~/.config/hypr/scripts
$mainMod     = SUPER


# ── Autostart ───────────────────────────────────────────────

# exec-once = swww-daemon                                        # if you use swww 
# exec-once = hyprlax ~/.config/hypr/current_wallpaper

# cursor — double cursor fix for nvidia


# ── Environment ─────────────────────────────────────────────

# nvidia
env = LIBVA_DRIVER_NAME,         nvidia
env = GBM_BACKEND,               nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = __GL_GSYNC_ALLOWED,        0         # disable gsync (use vrr instead)
env = WLR_DRM_NO_ATOMIC,         1         # fixes crashes on some nvidia setups

# wayland backends
env = GDK_BACKEND,               wayland,x11
env = QT_QPA_PLATFORM,           wayland;xcb
env = EGL_PLATFORM,              wayland

# cursor
env = WLR_NO_HARDWARE_CURSORS,   1         # nvidia double cursor fix
env = KWIN_DRM_NO_AMS,           1

# gtk
env = GTK_CSD,                   0         # disable client-side decorations
env = GTK_OVERLAY_SCROLLING,     1


# ── Input ───────────────────────────────────────────────────

input {
    kb_layout = gb
    follow_mouse       = 1
    numlock_by_default = true
    accel_profile      = flat  # no mouse acceleration
    sensitivity        = 0

    touchpad {
        natural_scroll = true
    }
}


# ── General ─────────────────────────────────────────────────

general {
    gaps_in             = 5
    gaps_out            = 8
    border_size         = 2
    col.active_border   = $primary          # from colors.conf
    col.inactive_border = $surface_container
    layout              = dwindle
    resize_on_border    = true
}


# ── Decoration ──────────────────────────────────────────────

decoration {
    rounding         = 14
    active_opacity   = 1.0
    inactive_opacity = 0.95  # slightly dim unfocused windows

    blur {
        enabled            = true
        size               = 8
        passes             = 3
        vibrancy           = 0.15
        vibrancy_darkness  = 0.3
        noise              = 0.008
        contrast           = 0.9
        brightness         = 0.9
        popups             = true
        popups_ignorealpha = 0.3
    }

    shadow {
        enabled        = false
        range          = 30
        render_power   = 3
        color          = rgba(00000055)
        color_inactive = rgba(00000030)
        offset         = 0, 4
    }
}


# ── Animations ──────────────────────────────────────────────

animations {
    enabled = yes

    # custom bezier curves
    bezier = wind,   0.05, 0.9,  0.1, 1.05  # slight overshoot
    bezier = winIn,  0.1,  1.1,  0.1, 1.1   # bouncy enter
    bezier = winOut, 0.3, -0.3,  0,   1      # quick exit
    bezier = liner,  1,    1,    1,   1      # linear (for border)

    animation = windows,     1, 6,  wind,   slide
    animation = windowsIn,   1, 6,  winIn,  slide
    animation = windowsOut,  1, 5,  winOut, slide
    animation = windowsMove, 1, 5,  wind,   slide
    animation = border,      1, 1,  liner
    animation = borderangle, 1, 30, liner,  loop     # spinning border gradient
    animation = fade,        1, 10, default
    animation = workspaces,  1, 5,  wind,   slidefade 100%
}


# ── Layout ──────────────────────────────────────────────────

dwindle {
    force_split            = 0
    special_scale_factor   = 0.8   # scratchpad window size
    split_width_multiplier = 1.0
    use_active_for_splits  = true
    preserve_split         = yes   # keep split direction after closing windows
}


# ── Misc ────────────────────────────────────────────────────

misc {
    disable_hyprland_logo        = true
    force_default_wallpaper      = 0
    vrr                          = 1     # variable refresh rate
    animate_manual_resizes       = true
    animate_mouse_windowdragging = true
    focus_on_activate            = true
}


# ── Window Rules ────────────────────────────────────────────

# windowrulev2 = float,           class:^(org.pulseaudio.pavucontrol)$
# windowrulev2 = float,           class:^(blueman-manager)$
# windowrulev2 = opacity 0.9 0.8, class:^(dolphin)$


# ── Keybinds ────────────────────────────────────────────────

# apps
bind = $mainMod,       W,      exec,      $browser
bind = $mainMod SHIFT, RETURN, exec,      $fileManager

# utils
bind = $mainMod,       TAB,    cyclenext

# focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# switch workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# scratchpad
bind  = $mainMod,       S,          togglespecialworkspace, magic
bind  = $mainMod SHIFT, S,          movetoworkspace,        special:magic

# master layout shortcuts
bind  = $mainMod,       mouse_up,   layoutmsg, swapwithmaster
bind  = $mainMod,       mouse_down, layoutmsg, focusmaster

# mouse window controls
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# ── XWayland ────────────────────────────────────────────────

xwayland {
    use_nearest_neighbor = false  # smooth scaling instead of pixelated
    force_zero_scaling   = true   # let hyprland handle hidpi
}

# Aetherelic stable two-monitor layout
