# Aetherelic glassy blur / transparency
# Strong glass mode

decoration {
    rounding = 16

    # Lower = more transparent/glassy
    active_opacity = 0.84
    inactive_opacity = 0.76
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 12
        passes = 4
        vibrancy = 0.28
        ignore_opacity = true
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 22
        render_power = 3
        color = rgba(00000088)
    }
}
