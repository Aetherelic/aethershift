# =========================================================
# Aetherelic Hyprland startup
# Cleaned startup file for Arch + Hyprland + Vroomies rice
# =========================================================

# Wayland/dbus environment
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORMTHEME

# Portals
exec-once = bash -lc 'sleep 1; systemctl --user restart xdg-desktop-portal xdg-desktop-portal-hyprland xdg-desktop-portal-gtk 2>/dev/null || true'

# Tray helpers
exec-once = nm-applet --indicator
exec-once = blueman-applet

# Cursor / GTK basics
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = gsettings set org.gnome.desktop.interface cursor-theme Bibata-Modern-Ice
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = gsettings set org.gnome.desktop.interface icon-theme Papirus-Dark
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = gsettings set org.gnome.desktop.interface gtk-decoration-layout ":"

# Vroomies wallpaper / adaptive theme system
exec-once = awww-daemon
exec-once = bash -lc 'sleep 1; awww img ~/.config/hypr/current_wallpaper --transition-type fade --transition-duration 1.5 --resize crop'

# Quickshell / vroomies shell
exec-once = bash -lc 'sleep 2; QML_XHR_ALLOW_FILE_READ=1 quickshell --path ~/.config/quickshell/shell.qml'

# Notifications
exec-once = swaync

# Idle lock

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Audio defaults
exec-once = bash -lc 'sleep 3; ~/.config/hypr/scripts/audio-game-output.sh --quiet'
exec-once = bash -lc 'sleep 3; ~/.config/hypr/scripts/audio-fifine-input.sh --quiet'

# XWayland screenshare bridge for Discord

# Aetherelic daily welcome popup
exec-once = bash ~/.config/hypr/scripts/aetherelic-welcome-once.sh

# Random adaptive wallpaper/theme on boot
exec-once = bash ~/.config/hypr/scripts/boot-theme-shuffle.sh
